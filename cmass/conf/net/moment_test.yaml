fcn:
  fcn_depth: 0  # no embedding net (Identity)
  fcn_width: 16  # unused since fcn_depth=0
shared:
  model: 'moment'
  hidden_features: 16
  hidden_depth: 2
  activation: 'relu'
  num_transforms: 0  # unused by 'moment', ignored with a warning
  log2_batch_size: 7  # batch_size=128
  learning_rate: 1.e-3
  weight_decay: 0
  lr_patience: 10
  lr_decay_factor: 0.5
  early_stopping: True
  noise_percent: 0.0
  lr_scheduler: 'ReduceLROnPlateau'
  max_epochs: 1000
  dropout: 0.0
