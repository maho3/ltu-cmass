# Top-level save directory for trained models.
save_dir: null # (default: wdir/quijotelike/fastpm/models)

# --- GLOBAL CONFIGURATION ---
exp_index: null  # index of experiment to run (null for all)
net_index: 0     # Index of network to use in cfg.net (for ensembling, if applicable).
device: cpu      # Device to use for training (cpu or cuda).

# --- EXPERIMENT CONFIGURATION ---
Nmax: -1  # Maximum number of simulations to load (-1 for all).
correct_shot: true  # Whether to correct for shot noise when normalizing summaries.
tracer: halo # Type of tracer to use for inference (e.g., halo, galaxy, ngc_lightcone).

experiments:
  # List of experiments, each defining a set of summary statistics and k-ranges.
  - summary: [nbar, Pk0]   # monopole
    kmin: [0.]
    kmax: [0.4]
  - summary: [nbar, Pk0, Pk2, Pk4, Qk0]   # monopole, quadrupole, hexadecapole, reduced bispectrum
    kmin: [0.]
    kmax: [0.4]
  - summary: [nbar, zPk0]   # z-space monopole
    kmin: [0.]
    kmax: [0.4]
  - summary: [nbar, zPk0, zPk2, zPk4]   # z-space monopole
    kmin: [0.]
    kmax: [0.4]
  - summary: [nbar, zPk0, zPk2, zPk4, zEqQk0]   # monopole, quadrupole, hexadecapole, reduced equilateral bispectrum
    kmin: [0.]
    kmax: [0.4]
  - summary: [nbar, zPk0, zPk2, zPk4, zSqQk0]   # monopole, quadrupole, hexadecapole, reduced squeezed bispectrum
    kmin: [0.]
    kmax: [0.4]
  - summary: [nbar, zPk0, zPk2, zPk4, zSsQk0]   # monopole, quadrupole, hexadecapole, reduced subsampled bispectrum
    kmin: [0.]
    kmax: [0.4]
  - summary: [nbar, zPk0, zPk2, zPk4, zIsQk0]   # monopole, quadrupole, hexadecapole, reduced isoceles bispectrum
    kmin: [0.]
    kmax: [0.4]
  - summary: [nbar, zPk0, zPk2, zPk4, zQk0]   # monopole, quadrupole, hexadecapole, reduced bispectrum
    kmin: [0.]
    kmax: [0.4]

# --- TRAINING CONFIGURATION ---
Nnets: 10  # Number of best networks to ensemble for posterior inference.

# Data splitting
val_frac: 0.1  # Fraction of data to use for validation.
test_frac: 0.1  # Fraction of data to use for testing.
seed: 0  # Random seed for train/val/test split.

# Inference parameters
include_hod: False  # Whether to infer HOD parameters.
include_noise: False  # Whether to infer noise parameters.

# Model backend and engine
prior: quijote  # Prior to use for training (uniform, quijote).
backend: lampe  # Backend to use for training (sbi/lampe/pydelfi).
engine: NPE     # Engine to use for training (NPE/NLE/NRE).
embedding_net: fcn # Embedding network to use (fcn or cnn).

# Optimization parameters
batch_size: null  # Batch size for training.
learning_rate: null  # Learning rate for the optimizer.
stop_after_epochs: 50  # Stop early after this many epochs without improvement.
weight_decay: null  # Weight decay (L2 regularization).
lr_decay_factor: null  # Learning rate decay factor.
lr_patience: null  # Learning rate decay patience (epochs without improvement).

# Validation smoothing
validation_smoothing_method: ema  # Method for smoothing validation loss (none/swa/ema).
ema_decay: 0.9  # EMA decay value (only if validation_smoothing_method == 'ema').

# Cross-validation
cross_val: True  # Whether to use cross-validation for hyperparameter optimization.
n_splits: 4      # Number of splits for cross-validation.
cv_val_frac: 0.1 # Fraction of data to use for validation within each CV fold.

# Preprocessing
precompress: False  # Whether to precompress summaries before training.
pca_features: null  # Number of PCA features to keep. If null, no PCA.

# --- OPTUNA CONFIGURATION (Hyperparameter Optimization) ---
hyperprior:
  model: ['nsf']              # Supported models: 'nsf', 'maf'.
  hidden_features: [16, 512]  # Range for number of hidden features.
  num_transforms: [2, 8]      # Range for number of transforms.
  fcn_width: [16, 512]        # Range for FCN width.
  fcn_depth: [0, 4]           # Range for FCN depth.
  log2_batch_size: [5, 9]     # Log2 range for batch size (e.g., 2^5 to 2^9).
  learning_rate: [5e-6, 1e-2] # Range for learning rate.
  weight_decay: [1e-5, 1e-1]  # Range for weight decay.
  lr_patience: [5, 20]        # Range for learning rate patience.
  lr_decay_factor: [0.1, 0.9] # Range for learning rate decay factor.

n_trials: 25        # Total number of trials for hyperparameter optimization.
n_startup_trials: 50  # Number of initial trials to sample uniformly before using TPE.

# --- VALIDATION CONFIGURATION ---
clean_models: False  # Whether to delete poorly performing model files after validation.
